server:
  port: 8080

spring:
  application:
    name: worldseed-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/world-seed
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/master.xml

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

minio:
  host: localhost
  port: 9000
  secure: false
  access-key: minioadmin
  secret-key: minioadmin
  terrains-bucket-name: terrains
  connect-timeout: 5000
  write-timeout: 60000
  read-timeout: 10000


srtm:
  #Приоритет использования источников данных
  srtm-source-order:
    - CGIAR
    - ARDUPILOT
    - VFP
  #Текущий импортируемый источник данных
  #srtm-source: VFP
  #srtm-source: ARDUPILOT
  srtm-import-source: CGIAR
  #При старте запустить импорт высотных данных из соответствующего источника
  startup-import: true
  #Путь к хранилищу высотных данных ardupilot
  srtm-ardupilot-storage-path: c:/Projects/world-seed/data/ardupilot_srtm/
  #Путь к хранилищу высотных данных viewfinderpanoramas
  srtm-vfp-storage-path: c:/Projects/world-seed/data/vfp_srtm/
  #Путь к хранилищу высотных данных CGIAR
  srtm-cgiar-storage-path: c:/Projects/world-seed/data/cgiar_srtm/

generator:
  #overpass-api-url: https://overpass-api.de/api/interpreter
  overpass-api-url: https://maps.mail.ru/osm/tools/overpass/api/interpreter
  overpass-connect-timeout-ms: 5000
  overpass-read-timeout-ms: 10000
