server:
  port: 8080

spring:
  application:
    name: worldseed-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/world-seed
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/master.xml

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

minio:
  host: localhost
  port: 9000
  secure: false
  access-key: minioadmin
  secret-key: minioadmin
  terrains-bucket-name: terrains
  connect-timeout: 5000
  write-timeout: 60000
  read-timeout: 10000


srtm:
  #Приоритет использования источников данных
  srtm-source-order:
    - CGIAR
    - ARDUPILOT
    - VFP
  #Текущий импортируемый источник данных
  #srtm-source: VFP
  #srtm-source: ARDUPILOT
  srtm-import-source: CGIAR
  #При старте запустить импорт высотных данных из соответствующего источника
  startup-import: true
  #Путь к хранилищу высотных данных ardupilot
  srtm-ardupilot-storage-path: c:/Projects/world-seed/data/ardupilot_srtm/
  #Путь к хранилищу высотных данных viewfinderpanoramas
  srtm-vfp-storage-path: c:/Projects/world-seed/data/vfp_srtm/
  #Путь к хранилищу высотных данных CGIAR
  srtm-cgiar-storage-path: c:/Projects/world-seed/data/cgiar_srtm/

services:
  compression:
    lazy-run-delay-ms: 10000

logging:
  level:
    online.worldseed.service.generator.TerrainCompressionService: DEBUG

generator:
  #overpass-api-url: https://overpass-api.de/api/interpreter
  overpass-api-url: https://maps.mail.ru/osm/tools/overpass/api/interpreter
  overpass-connect-timeout-ms: 5000
  overpass-read-timeout-ms: 10000
  # Примерный расчет целевого OSM zoom с учетом окна видимости:
  # Набито примерно по
  # https://wiki.openstreetmap.org/wiki/RU:Zoom_levels#:~:text=RU:Zoom%20levels%20%2D%20OpenStreetMap%20Wiki
  resolutions:
    R_1_128:
      generation-type: TERRAIN_OSM
      lat-step: 0.0078125 # 1 / 128.0
      zoom-to: 12.7
      max-terrain-view-distance: 3
      compression: DRACO
    R_1_64:
      generation-type: TERRAIN_ALTITUDE
      lat-step: 0.015625 # 1 / 64.0
      zoom-to: 11.7
      max-terrain-view-distance: 3
      grid-size: 18
      compression: DRACO_LAZY
    R_1_16:
      generation-type: TERRAIN_ALTITUDE
      lat-step: 0.0625 # 1 / 16.0
      zoom-to: 9.7
      max-terrain-view-distance: 3
      grid-size: 18
      compression: DRACO_LAZY
    R_1_4:
      generation-type: TERRAIN_ALTITUDE
      lat-step: 0.25 # 1 / 4.0
      zoom-to: 7.7
      max-terrain-view-distance: 3
      grid-size: 18
      compression: DRACO_LAZY
    R_1:
      generation-type: TERRAIN_ALTITUDE
      lat-step: 1.0
      zoom-to: 6.7
      max-terrain-view-distance: 3
      grid-size: 18
      compression: DRACO_LAZY
    R_3:
      generation-type: TERRAIN_PLANET
      lat-step: 3.0
      zoom-to: 0
      texture-source: earth1024.jpg
      compression: DRACO
  compression:
    OFF:
      enabled: false
      lazy: false
      command: [ ]
      timeout-ms: 1000
    MESHOPT:
      enabled: true
      lazy: false
      # См. https://www.npmjs.com/package/@gltf-transform/cli — геометрия: подкоманды meshopt / draco
      command: [ "gltf-transform", "optimize", "{input}", "{output}", "--compress", "meshopt", "--texture-compress", "webp" ]
      timeout-ms: 120000
    DRACO:
      enabled: true
      lazy: false
      command: [ "gltf-transform", "optimize", "{input}", "{output}", "--compress", "draco", "--texture-compress", "webp" ]
      timeout-ms: 120000
    DRACO_LAZY:
      enabled: true
      lazy: true
      command: [ "gltf-transform", "optimize", "{input}", "{output}", "--compress", "draco", "--texture-compress", "webp" ]
      timeout-ms: 120000
